<!DOCTYPE html>
<html>
<head><title>Test Connection - Firman Sahidin</title></head>
<body>
    <h1 id="msg">Sakedap, nuju ngetés jalur...</h1>
    <script>
        // URL Webhook Mang Firman (Pastikeun ieu geus leres)
        const URL = 'https://webhook.site/9326deec-1e36-4aa3-8945-3efe41a641e5';
        
        async function testKoneksi() {
            try {
                // Tés 1: Paké fetch standar
                await fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ test: "HALO_WEBHOOK", researcher: "Firman" })
                });

                // Tés 2: Paké Beacon (nu paling ampuh)
                navigator.sendBeacon(URL, "TEST_BEACON_FIRMAN_SAHIDIN");

                document.getElementById('msg').innerHTML = "✅ SAMPURASUN! Cék Webhook ayeuna, Mang!";
                document.body.style.backgroundColor = "#d4edda";
            } catch (e) {
                document.getElementById('msg').innerHTML = "❌ GAGAL: " + e.message;
                document.body.style.backgroundColor = "#f8d7da";
            }
        }

        // Jalankeun saatos halaman kabuka
        window.onload = testKoneksi;
    </script>
</body>
</html>
